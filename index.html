<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="info-toggle" class="info-toggle">ℹ️</button>
    <div id="instructions" class="instructions hidden">
        <div class="instructions-box">
            <h2>How to Play</h2>
            <ul>
                <li>Left-click to reveal a tile</li>
                <li>Right-click to place a flag</li>
                <li>Avoid mines 💣</li>
                <li>Numbers show how many tiles are adjacent to each tile</li>
                <li>Reveal all safe tiles to win</li>
                <li>Press <b>R</b> to restart</li>
                <li>Good Luck! 🍀</li>
            </ul>
        </div>
    </div>
    <button id="theme-toggle" class="theme-toggle">☀️</button>
    
    <!--MAIN MENU-->
    <div id="menu-screen" class="screen">
        <h1>Minesweeper</h1>
        <div class="difficulty-select">
            <label>Select Difficulty: </label>
            <select id="difficulty">
                <option value="Easy">Easy (9x9)</option>
                <option value="Intermediate">Intermediate (16x16)</option>
                <option value="Expert">Expert (30x16)</option>
            </select>
        </div>

        <button id="begin-btn">BEGIN</button>
    </div>

    <!--GAME SCREEN-->
    <div id="game-screen" class="screen hidden">
        <div class="game-info">
            <span id="difficulty-display"></span>
            <span>Time: <span id="time">0</span></span>
        </div>
        <div id="board"></div>
    </div>

    <!--RESULT SCREEN-->
    <div id="result-screen" class="screen hidden">
        <h2 id="result-title"></h2>

        <p id="result-difficulty"></p>
        <p id="result-time"></p>

        <button id="restart-btn">Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
